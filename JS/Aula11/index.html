<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prova 11</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div id="container">

        <div class="box">

            <h1 class="titulo">Formulário</h1>

            <form id="formulario">

                <input type="text"     id="usuario" name="usuario"  placeholder="Nome do usuário.">
                <input type="password" id="senha"   name="senha"    placeholder="Senha.">
                <input type="tel"      id="tel"     name="telefone" placeholder="Telefone.">
                <input type="email"    id="email"   name="email"    placeholder="E-mail.">
                <input type="date"     id="data"    name="nascimento"> 

                <button class="botao">Enviar</button>
            </form>
            <button id="limpar" class="botao">Limpar Formulário</button>

        </div>

    </div>


    <script src="script.js"></script>
</body>
</html>
